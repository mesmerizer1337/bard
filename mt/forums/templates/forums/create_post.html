{% extends "base.html" %}
{% block content %}
<h2>Reply to: {{ thread.title }}</h2>
<form method="post">
    {% csrf_token %}
    <label for="content">Message:</label>
    <textarea name="content" id="content" required></textarea>
    <button type="submit" class="btn btn-success">Post Reply</button>
</form>
<a href="{% url 'forum_thread' thread.id %}" class="btn btn-secondary">Back to Thread</a>
{% endblock %}
