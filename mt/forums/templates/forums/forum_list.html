{% extends "base.html" %}
{% block content %}
<h2>Forum Threads</h2>
<a href="{% url 'create_thread' %}" class="btn btn-primary">Create New Thread</a>
<ul>
    {% for thread in threads %}
    <li><a href="{% url 'forum_thread' thread.id %}">{{ thread.title }}</a> ({{ thread.created_at }})</li>
    {% empty %}
    <li>No threads available.</li>
    {% endfor %}
</ul>
{% endblock %}
